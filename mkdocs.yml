site_name: PrototypeSTL
site_description: A high-performance, embedded-friendly C++ standard library alternative
site_url: https://gauravagargarg.github.io/PrototypeSTL/
repo_url: https://github.com/GauravAgarwalGarg/PrototypeSTL
repo_name: GauravAgarwalGarg/PrototypeSTL

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Design Philosophy: design-philosophy.md
  - Why Not STL?: why-not-stl.md
  - Containers:
    - Overview: containers/overview.md
    - vector: containers/vector.md
    - fixed_vector: containers/fixed-vector.md
    - array: containers/array.md
    - list: containers/list.md
    - deque: containers/deque.md
    - string: containers/string.md
    - span: containers/span.md
    - optional: containers/optional.md
    - variant: containers/variant.md
    - bitset: containers/bitset.md
    - flat_map: containers/flat-map.md
    - flat_set: containers/flat-set.md
    - ring_buffer: containers/ring-buffer.md
    - static_map: containers/static-map.md
    - stack: containers/stack.md
    - queue: containers/queue.md
  - Algorithms:
    - Overview: algorithms/overview.md
    - Sorting: algorithms/sorting.md
    - Searching: algorithms/searching.md
    - Copying: algorithms/copying.md
    - Numeric: algorithms/numeric.md
    - Heap: algorithms/heap.md
  - Iterators:
    - Overview: iterators/overview.md
    - Reverse & Move: iterators/reverse-move.md
  - Allocators:
    - Overview: allocators/overview.md
    - Memory Arena: allocators/memory-arena.md
    - Arena Allocator: allocators/arena-allocator.md
    - Pool Allocator: allocators/pool-allocator.md
    - Stack Allocator: allocators/stack-allocator.md
  - Functors:
    - Overview: functors/overview.md
    - Comparators: functors/comparators.md
    - Function: functors/function.md
    - Hash: functors/hash.md
  - Concurrency:
    - Overview: concurrency/overview.md
    - Atomic: concurrency/atomic.md
    - SPSC Queue: concurrency/spsc-queue.md
  - Guides:
    - Migration Guide: migration-guide.md
    - Allocator Guide: allocator-guide.md
    - API Reference: api-reference.md
  - Benchmarks: benchmarks.md
